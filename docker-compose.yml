version: "2.1"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wordbook
      TZ: Asia/Shanghai
    volumes:
      - db_data:/var/lib/mysql
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: wordbook
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: "24"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      TONGYI_API_KEY: ${TONGYI_API_KEY}
      TONGYI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode
      SERVER_PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db_data:
